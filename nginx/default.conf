# This is a basic Nginx configuration file that sets up a reverse proxy to forward incoming requests to the auth-service running on port 3000.
# The configuration listens on port 80 for incoming HTTP requests and forwards them to the auth-service.
# You can customize this configuration further based on your specific requirements, such as adding SSL/TLS support, configuring timeouts, and setting up logging and monitoring.
server {
    
    # Listen on port 80 for incoming HTTP requests. This is the default port for HTTP traffic, and it allows clients to access the Nginx server without specifying a port in the URL. In a production environment, you might want to use a different port (e.g., 8080) or set up SSL/TLS to serve traffic over HTTPS on port 443 for improved security.
    # Note: In a real application, you would want to implement proper error handling, security measures, and other configurations to ensure the reliability and security of your application. For example, you might want to add SSL/TLS support, configure timeouts, and set up logging and monitoring. Additionally, you would want to ensure that the auth-service is properly secured and can handle the expected load of requests.
    # This configuration assumes that the auth-service is running on the same Docker network and is accessible via the hostname "auth-service" on port 3000. Make sure to adjust the hostname and port as needed based on your Docker setup and service configuration.
    # In this example, we are using a simple proxy_pass directive to forward requests to the auth-service. You can also add additional proxy settings as needed, such as proxy_set_header to forward headers, proxy_read_timeout to set timeouts, and other directives to optimize the performance and reliability of your reverse proxy setup.
    # For more complex routing, you can use location blocks to define specific routes and their corresponding proxy_pass directives. For example, you could have a location block for /auth that forwards to the auth-service and another location block for /tasks that forwards to a task-service.
    # This is a basic configuration to get you started with a reverse proxy setup using Nginx in a Docker environment. You can customize and expand this configuration as needed based on the specific requirements of your application and services. Remember to test your Nginx configuration and ensure that it is properly forwarding requests to the auth-service and handling responses correctly. You can use tools like curl or Postman to send requests to your Nginx server and verify that they are being forwarded to the auth-service as expected.
    #Finally, make sure to reload or restart your Nginx server after making changes to the configuration to apply the new settings.
    listen 80;

    # Everything goes through the auth-service/gateway
    # This is a simple reverse proxy configuration that forwards all requests to the auth-service.
    # In a real application, you would have more complex routing logic here to handle different services and endpoints.
    # For example, you might want to route /auth/* to the auth-service and /tasks/* to a task-service.
    # You can also add load balancing, caching, and other features as needed.
    # For this example, we are keeping it simple and forwarding everything to the auth-service.
    # Note: In production, you would want to add proper error handling, security measures, and other configurations to ensure the reliability and security of your application.
    # For example, you might want to add SSL/TLS support, configure timeouts, and set up logging and monitoring.
    # Additionally, you would want to ensure that the auth-service is properly secured and can handle the expected load of requests.
    # This configuration assumes that the auth-service is running on the same Docker network and is accessible via the hostname "auth-service" on port 3000.
    # Make sure to adjust the hostname and port as needed based on your Docker setup and service configuration.
    # In this example, we are using a simple proxy_pass directive to forward requests to the auth-service.
    # You can also add additional proxy settings as needed, such as proxy_set_header to forward headers, proxy_read_timeout to set timeouts, and other directives to optimize the performance and reliability of your reverse proxy setup.
    # For more complex routing, you can use location blocks to define specific routes and their corresponding proxy_pass directives.
    # For example, you could have a location block for /auth that forwards to the auth-service and another location block for /tasks that forwards to a task-service.
    # This is a basic configuration to get you started with a reverse proxy setup using Nginx in a Docker environment. You can customize and expand this configuration as needed based on the specific requirements of your application and services.
    # Remember to test your Nginx configuration and ensure that it is properly forwarding requests to the auth-service and handling responses correctly. You can use tools like curl or Postman to send requests to your Nginx server and verify that they are being forwarded to the auth-service as expected.
    # Finally, make sure to reload or restart your Nginx server after making changes to the configuration to apply the new settings.
    # In summary, this Nginx configuration sets up a reverse proxy that forwards all incoming requests to the auth-service running on port 3000. You can customize this configuration further to handle specific routes, add security measures, and optimize performance as needed for your application.
    location / {
        proxy_pass http://auth-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
